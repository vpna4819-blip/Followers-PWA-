<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instagram Followers</title>
    <meta name="theme-color" content="#000000">
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Core Optimize">
    <link rel="apple-touch-icon" href="logo.png">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            overflow: hidden; 
            overscroll-behavior-y: none; 
            
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- പാസ്‌വേർഡ് സ്ക്രീൻ സ്റ്റൈൽ --- */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999999;
        }

        .login-title {
            color: #ffffff;
            font-size: 38px;
            font-weight: bold;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .login-subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .password-input {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px 20px;
            border-radius: 12px;
            color: #ffffff;
            font-size: 18px;
            width: 250px;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .password-input:focus {
            border-color: #2ecc71;
            background: rgba(255, 255, 255, 0.12);
        }

        .password-input.error {
            border-color: #ff4757;
            background: rgba(255, 71, 87, 0.1);
            animation: shake 0.4s ease;
        }

        .submit-btn {
            background: #2ecc71; 
            color: #000000;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, background 0.3s;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);
        }

        .submit-btn:active {
            transform: scale(0.95);
            background: #27ae60;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
        }

        #main-app {
            display: none; 
            width: 100%;
            height: 100%;
        }
        /* ------------------------------- */

        /* ബാക്ക്ഗ്രൗണ്ട് എഫക്റ്റ് */
        .glow-circle-1, .glow-circle-2 {
            position: fixed; 
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            pointer-events: none;
        }
        .glow-circle-1 {
            width: 300px;
            height: 300px;
            background: rgba(59, 130, 246, 0.25);
            top: 10%;
            left: -10%;
        }
        .glow-circle-2 {
            width: 350px;
            height: 350px;
            background: rgba(236, 72, 153, 0.25);
            bottom: 5%;
            right: -10%;
        }

        /* സ്ക്രോൾ സിസ്റ്റം */
        .scroll-container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 35px; 
            padding-bottom: 60px; 
            box-sizing: border-box;
            scroll-behavior: smooth; 
        }

        .scroll-container::-webkit-scrollbar {
            width: 4px;
        }
        .scroll-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .scroll-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .header-container {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
        }
        .title-instagram {
            color: #ffffff;
            font-size: 50px;
            font-weight: bold;
            margin: 0;
            letter-spacing: 2px;
        }
        .subtitle-hub {
            color: rgba(255, 255, 255, 0.8);
            font-size: 20px;
            font-weight: 500;
            margin: 10px 0 0 0;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .version-watermark {
            text-align: center;
            color: rgba(255, 255, 255, 0.2); 
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            pointer-events: none; 
            user-select: none;
            margin-top: 15px; 
        }

        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 85%;
            max-width: 400px;
            margin-bottom: 30px;
        }

        .glass-btn {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15); 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            color: #ffffff;
            padding: 22px 20px;
            font-size: 19px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 600;
            border-radius: 16px;
            cursor: pointer;
            text-align: center;
            transition: background 0.3s, transform 0.2s, border 0.5s ease, color 0.5s ease;
            letter-spacing: 1px;
            outline: none;
        }

        .glass-btn:active {
            transform: translateY(1px) scale(0.98);
            background: rgba(255, 255, 255, 0.15);
        }

        /* --- 1. ആദ്യത്തെ ക്ലിക്ക് (ഓറഞ്ച് നിറം) --- */
        .glass-btn.visited-once {
            color: #ff9800 !important; 
            border: 1px solid rgba(255, 152, 0, 0.6); 
            background: rgba(255, 152, 0, 0.05);
        }

        .glass-btn.visited-once::after {
            content: '✔';
            position: absolute;
            right: 25px; 
            color: #ff9800;
            font-size: 20px;
            font-weight: bold;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* --- 2. രണ്ടാമത്തെ ക്ലിക്ക് (പച്ച നിറം & ലോക്ക്) --- */
        .glass-btn.visited-twice {
            color: #2ecc71 !important; 
            border: 1px solid rgba(46, 204, 113, 0.6); 
            background: rgba(46, 204, 113, 0.05);
            pointer-events: none; 
        }

        .glass-btn.visited-twice::after {
            content: '✔';
            position: absolute;
            right: 25px; 
            color: #2ecc71; 
            font-size: 20px;
            font-weight: bold;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* --- സ്വൈപ്പ് റീസെറ്റ് ബട്ടൺ --- */
        .swipe-container {
            position: relative;
            width: 320px; 
            height: 70px; 
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.05), 0 8px 32px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            overflow: hidden;
            margin-top: 10px;
            margin-bottom: 40px;
            flex-shrink: 0; 
        }

        .swipe-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0;
            background: rgba(255, 20, 20, 0.6);
            border-radius: 50px 0 0 50px;
            z-index: 1;
        }

        .swipe-text {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
            z-index: 2;
            pointer-events: none;
            user-select: none;
        }

        .swipe-knob {
            position: absolute;
            top: 5px;
            left: 5px;
            width: 60px; 
            height: 60px; 
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: inset 0 5px 15px rgba(255, 255, 255, 0.3), 0 2px 10px rgba(0,0,0,0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            font-size: 22px;
            z-index: 3;
            cursor: grab;
        }

        .swipe-knob:active {
            cursor: grabbing;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 class="login-title">Core Optimize</h1>
        <p class="login-subtitle">Please enter password</p>
        <input type="password" id="password-input" class="password-input" placeholder="Password">
        <button id="login-submit-btn" class="submit-btn">Submit</button>
    </div>

    <div id="main-app">
        <div class="glow-circle-1"></div>
        <div class="glow-circle-2"></div>

        <div class="scroll-container" id="main-scroll-container">
            <div class="header-container">
                <h1 class="title-instagram">Instagram</h1>
                <div class="subtitle-hub">Followers</div>
                <div class="version-watermark">Version 1.0.2</div>
            </div>

            <div class="buttons-container">
                <button data-id="btn1" data-url="https://takipcimx.net/tools/send-follower/70220054978" class="glass-btn webview-trigger">Website 1</button>
                <button data-id="btn2" data-url="https://fastfollow.in/tools/send-follower/70220054978" class="glass-btn webview-trigger">Website 2</button>
                <button data-id="btn3" data-url="https://takipcitime.com/tools/send-follower/70220054978" class="glass-btn webview-trigger">Website 3</button>
                <button data-id="btn4" data-url="https://takipcitime.net/tools/send-follower/70220054978" class="glass-btn webview-trigger">Website 4</button>
                <button data-id="btn5" data-url="https://takipcikrali.com/tools/send-follower/70220054978" class="glass-btn webview-trigger">Website 5</button>
                <button data-id="btn6" data-url="https://takipciking.com/tools/send-follower/70220054978" class="glass-btn webview-trigger">Website 6</button>
                <button data-id="btn7" data-url="https://takipcikrali.com/tools/send-follower/70220054978" class="glass-btn webview-trigger">Website 7</button>
                <button data-id="btn8" data-url="https://takipcimx.com/tools/send-follower/70220054978" class="glass-btn webview-trigger">Website 8</button>
                <button data-id="btn9" data-url="https://birtakipci.com/tools/send-follower/70220054978" class="glass-btn webview-trigger">Website 9</button>
                <button data-id="btn10" data-url="https://takip88.com/tools/send-follower/70220054978" class="glass-btn webview-trigger">Website 10</button>
            </div>

            <div class="swipe-container" id="swipeContainer">
                <div class="swipe-fill" id="swipeFill"></div>
                <div class="swipe-text" id="swipeText">Reset (Swipe)</div>
                <div class="swipe-knob" id="swipeKnob">&#10140;</div>
            </div>
        </div>
    </div>

    <script>
        // --- FRESH SESSION DETECTOR (അൺഇൻസ്റ്റാൾ ചെയ്ത് വീണ്ടും ഇൻസ്റ്റാൾ ചെയ്യുമ്പോൾ ഡാറ്റ ക്ലിയർ ചെയ്യാൻ) ---
        if (!sessionStorage.getItem('sessionActive')) {
            localStorage.removeItem('isAppUnlocked');
            localStorage.removeItem('buttonStates');
            localStorage.removeItem('leaveTime');
            sessionStorage.setItem('sessionActive', 'true');
        }

        // --- പാസ്‌വേർഡ് സിസ്റ്റം ലോജിക് ---
        const loginScreen = document.getElementById('login-screen');
        const mainApp = document.getElementById('main-app');
        const passInput = document.getElementById('password-input');
        const submitBtn = document.getElementById('login-submit-btn');

        const CORRECT_PASSWORD = '69254715AL';

        if (localStorage.getItem('isAppUnlocked') === 'true') {
            loginScreen.style.display = 'none';
            mainApp.style.display = 'block';
        }

        submitBtn.addEventListener('click', () => {
            if (passInput.value === CORRECT_PASSWORD) {
                localStorage.setItem('isAppUnlocked', 'true');
                loginScreen.style.display = 'none';
                mainApp.style.display = 'block';
            } else {
                passInput.classList.add('error');
                passInput.value = '';
                setTimeout(() => {
                    passInput.classList.remove('error');
                }, 400); 
            }
        });

        passInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                submitBtn.click();
            }
        });
        // ------------------------------------

        // പ്രധാന ആപ്പിന്റെ ലോജിക്
        const triggers = document.querySelectorAll('.webview-trigger');
        const mainScroll = document.getElementById('main-scroll-container');
        
        let backgroundTime = null;
        const THREE_MINUTES = 3 * 60 * 1000;

        window.addEventListener('DOMContentLoaded', () => {
            const buttonStates = JSON.parse(localStorage.getItem('buttonStates') || '{}');
            
            for (const [btnId, count] of Object.entries(buttonStates)) {
                const btn = document.querySelector(`[data-id="${btnId}"]`);
                if (btn) {
                    if (count === 1) {
                        btn.classList.add('visited-once'); 
                    } else if (count >= 2) {
                        btn.classList.add('visited-twice'); 
                    }
                }
            }
        });

        // ലിങ്കുകൾ പുതിയ ടാബിൽ സുരക്ഷിതമായി തുറക്കാനും ബാക്ക്ഗ്രൗണ്ടിൽ ഉടനടി കൗണ്ട് ചെയ്യാനും
        triggers.forEach(trigger => {
            trigger.addEventListener('click', function(e) {
                const url = this.getAttribute('data-url');
                if (url) {
                    e.preventDefault(); 
                    
                    const btnId = this.getAttribute('data-id');
                    let states = JSON.parse(localStorage.getItem('buttonStates') || '{}');
                    
                    let count = states[btnId] || 0;
                    count++; 
                    states[btnId] = count;
                    localStorage.setItem('buttonStates', JSON.stringify(states));

                    if (count === 1) {
                        this.classList.add('visited-once');
                    } else if (count >= 2) {
                        this.classList.remove('visited-once');
                        this.classList.add('visited-twice'); 
                    }

                    window.open(url, '_blank');
                }
            });
        });

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                backgroundTime = new Date().getTime();
                localStorage.setItem('leaveTime', backgroundTime);
            } else {
                const storedLeaveTime = localStorage.getItem('leaveTime');
                if (storedLeaveTime) {
                    const currentTime = new Date().getTime();
                    const timeDifference = currentTime - parseInt(storedLeaveTime);

                    if (timeDifference > THREE_MINUTES) {
                        resetApp();
                    }
                    localStorage.removeItem('leaveTime');
                }
            }
        });

        function resetApp() {
            localStorage.removeItem('buttonStates');
            localStorage.removeItem('leaveTime');

            triggers.forEach(btn => {
                btn.classList.remove('visited-once', 'visited-twice');
            });
            mainScroll.scrollTo({ top: 0, behavior: 'smooth' }); 
        }

        // --- സ്വൈപ്പ് റീസെറ്റ് ലോജിക് ---
        const container = document.getElementById('swipeContainer');
        const knob = document.getElementById('swipeKnob');
        const fill = document.getElementById('swipeFill');
        const swipeTextElement = document.getElementById('swipeText');

        let isDragging = false;
        let startX = 0;
        let currentX = 0;

        const onDragStart = (e) => {
            isDragging = true;
            startX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            knob.style.transition = 'none';
            fill.style.transition = 'none';
        };

        const onDragMove = (e) => {
            if (!isDragging) return;
            if (e.cancelable) { e.preventDefault(); }

            const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            let diff = clientX - startX;
            const maxDrag = container.offsetWidth - knob.offsetWidth - 10;

            if (diff < 0) diff = 0;
            if (diff > maxDrag) diff = maxDrag;

            currentX = diff;
            knob.style.left = `${currentX + 5}px`;
            fill.style.width = `${currentX + 35}px`; 
        };

        const onDragEnd = () => {
            if (!isDragging) return;
            isDragging = false;
            knob.style.transition = 'left 0.4s ease';
            fill.style.transition = 'width 0.4s ease';
            const maxDrag = container.offsetWidth - knob.offsetWidth - 10;

            if (currentX >= maxDrag - 5) { 
                swipeTextElement.innerText = "Done!";
                fill.style.background = "rgba(255, 20, 20, 0.9)";
                knob.style.left = `${maxDrag + 5}px`;
                fill.style.width = '100%';
                
                resetApp();

                setTimeout(() => {
                    resetKnob();
                    swipeTextElement.innerText = "Reset (Swipe)";
                    fill.style.background = "rgba(255, 20, 20, 0.6)";
                }, 1500);
            } else {
                resetKnob();
            }
        };

        const resetKnob = () => {
            currentX = 0;
            knob.style.left = '5px';
            fill.style.width = '0px';
        };

        knob.addEventListener('mousedown', onDragStart);
        document.addEventListener('mousemove', onDragMove);
        document.addEventListener('mouseup', onDragEnd);
        
        knob.addEventListener('touchstart', onDragStart, { passive: false });
        document.addEventListener('touchmove', onDragMove, { passive: false });
        document.addEventListener('touchend', onDragEnd);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => {
                        console.log('Service Worker Registered successfully');
                        reg.update(); // പുതിയ അപ്ഡേറ്റുകൾ ഉണ്ടോ എന്ന് എപ്പോഴും പരിശോധിക്കാൻ
                    })
                    .catch(err => console.log('Service Worker registration failed: ', err));
            });
        }
    </script>

</body>
</html>
